<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GETİRGÖTÜR</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 9999;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }
      #page-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #page-loader img {
        width: 120px;
        height: auto;
        animation: loader-spin 1.5s linear infinite;
      }
      @keyframes loader-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="page-loader">
      <img src="/logo.jpeg" alt="Getirgötür" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
